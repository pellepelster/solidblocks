version: "3.9"

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB:       hello_world
      POSTGRES_USER:     hello_world
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello_world -d hello_world"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     hello_world
      DB_USER:     hello_world
      DB_PASSWORD: secret
    depends_on:
      postgres:
        condition: service_healthy
