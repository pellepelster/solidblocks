services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: hello_world
      POSTGRES_USER: hello_world
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hello_world -d hello_world" ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: hello_world
      DATABASE_USER: hello_world
      DATABASE_PASSWORD: secret
    depends_on:
      postgres:
        condition: service_healthy
