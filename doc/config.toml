baseURL = 'https://pellepelster.github.io/solidblocks/'
languageCode = 'en-us'
title = 'Solidblocks'

[security]

[security.funcs]
getenv = ['.*_VERSION$', '.*_CHECKSUM$', 'SOLIDBLOCKS_VERSION_RAW']

[markup]
[markup.goldmark.renderer]
unsafe = true

[params]
themeVariant = "blcks"
disableLandingPageButton = true

[module]

[[module.imports]]
path = 'github.com/McShelby/hugo-theme-relearn'

[[module.imports]]
path = "cj.rs/gohugo-asciinema"

[params.asciinema.defaults]
theme = "solarized-light"
loop = false
autoPlay = false
speed = 4.0

