---
name: cloud1
# to add dns based endpoints and ssl certificates just add a root domain
root_domain: blcks-test.de

providers:
  # use pass password manager for secret storage
  - type: pass
  # ssh key for VM mgmt. will be loaded from <name>.key or the default ssh key paths
  - type: ssh_key
  # use Hetzner cloud to create resources like VMs, storage, networking
  - type: hcloud
  # to keep all data safe configure automatic backups to locally attached disks
  - type: backup_local

services:
  # spin up a Postgresql database
  - type: postgresql
    name: database1
    databases:
      # create a database with auto-generated credentials
      - name: hello-world
  # deploy a dockerized hello world application
  - type: docker
    name: service1
    image: ghcr.io/pellepelster/solidblocks-hello-world:latest
    endpoints:
      - container_port: 8080
    # inject database connection details and credentials into environment
    links:
      - database1
